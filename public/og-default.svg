<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050805" />
      <stop offset="50%" stop-color="#0a0f0a" />
      <stop offset="100%" stop-color="#020302" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.05" />
    </pattern>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Logo Group -->
  <g transform="translate(520, 150)">
    <rect width="160" height="160" rx="32" fill="#000000" stroke="#4ade80" stroke-width="3" filter="url(#glow)"/>
    <text x="80" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#4ade80" text-anchor="middle" filter="url(#glow)">OB</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="4">OPENBOX</text>

  <!-- Tagline -->
  <text x="600" y="490" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#a1a1aa" text-anchor="middle" letter-spacing="8">WHERE BUILDERS MEET.</text>

  <!-- Bottom Accent Line -->
  <rect x="550" y="560" width="100" height="4" fill="#4ade80" rx="2" filter="url(#glow)" />
</svg>
